<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Classe Pro</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        
        /* Box Riepilogo */
        .stats { display: flex; gap: 20px; margin-bottom: 20px; background: #e8f0fe; padding: 15px; border-radius: 8px; font-weight: bold; }
        .absent-count { color: #d93025; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #1a73e8; color: white; text-transform: uppercase; }
        
        .col-nome { text-align: left; font-weight: bold; width: 250px; }
        tr:nth-child(even) { background-color: #fafafa; }
        
        /* Stile per gli assenti */
        .row-absent { background-color: #ffebee !important; color: #c62828; }
        .absent-text { font-style: italic; font-weight: normal; color: #d93025; }

        input[type="number"] { width: 50px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .total-hours { font-weight: bold; color: #1e8e3e; }
        
        .checkbox-cell { width: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h1>REGISTRO PRESENZE DIGITALE</h1>

    <div class="stats">
        <div>Totale Studenti: <span id="total-students">4</span></div>
        <div class="absent-count">Assenti oggi: <span id="absent-display">0</span></div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th class="checkbox-cell">Pres.</th>
                <th>Nome Alunno</th>
                <th>Firma Entrata</th>
                <th>Firma Uscita</th>
                <th>Ore Totali</th>
            </tr>
        </thead>
        <tbody id="registro-body">
            <tr id="row-1">
                <td><input type="checkbox" checked onchange="updateRow(1)"></td>
                <td class="col-nome">Mattia Rossi</td>
                <td><input type="number" value="8" min="8" max="20" oninput="calculateHours(1)">:00</td>
                <td><input type="number" value="13" min="8" max="20" oninput="calculateHours(1)">:00</td>
                <td><span id="total-1" class="total-hours">5</span> ore</td>
            </tr>
            <tr id="row-2">
                <td><input type="checkbox" checked onchange="updateRow(2)"></td>
                <td class="col-nome">Luca Bianchi</td>
                <td><input type="number" value="8" oninput="calculateHours(2)">:00</td>
                <td><input type="number" value="12" oninput="calculateHours(2)">:00</td>
                <td><span id="total-2" class="total-hours">4</span> ore</td>
            </tr>
            <tr id="row-3">
                <td><input type="checkbox" checked onchange="updateRow(3)"></td>
                <td class="col-nome">Giulia Verdi</td>
                <td><input type="number" value="9" oninput="calculateHours(3)">:00</td>
                <td><input type="number" value="13" oninput="calculateHours(3)">:00</td>
                <td><span id="total-3" class="total-hours">4</span> ore</td>
            </tr>
            <tr id="row-4">
                <td><input type="checkbox" checked onchange="updateRow(4)"></td>
                <td class="col-nome">Francesco Neri</td>
                <td><input type="number" value="8" oninput="calculateHours(4)">:00</td>
                <td><input type="number" value="13" oninput="calculateHours(4)">:00</td>
                <td><span id="total-4" class="total-hours">5</span> ore</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function calculateHours(id) {
        const row = document.getElementById(`row-${id}`);
        const inputs = row.getElementsByTagName('input');
        const check = inputs[0];
        const hEntrata = parseInt(inputs[1].value);
        const hUscita = parseInt(inputs[2].value);
        
        if(check.checked) {
            let diff = hUscita - hEntrata;
            document.getElementById(`total-${id}`).innerText = diff > 0 ? diff : 0;
        }
    }

    function updateRow(id) {
        const row = document.getElementById(`row-${id}`);
        const checkbox = row.querySelector('input[type="checkbox"]');
        const displayTotal = document.getElementById(`total-${id}`);
        
        if (!checkbox.checked) {
            row.classList.add('row-absent');
            displayTotal.innerText = "ASSENTE";
        } else {
            row.classList.remove('row-absent');
            calculateHours(id);
        }
        updateAbsentCount();
    }

    function updateAbsentCount() {
        const total = document.querySelectorAll('input[type="checkbox"]').length;
        const presents = document.querySelectorAll('input[type="checkbox"]:checked').length;
        document.getElementById('absent-display').innerText = total - presents;
    }

    // Inizializza il conteggio al caricamento
    updateAbsentCount();
</script>

</body>
</html>
